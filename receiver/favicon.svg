<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
<!-- Favicon: simplified stopwatch from obs-delay-stream-logo -->

<!-- Background -->
<rect fill="#1a0d38" width="32" height="32" rx="6"/>

<!-- Stem -->
<line stroke="#b09ce0" stroke-width="2" stroke-linecap="round" x1="16" y1="4.5" x2="16" y2="7"/>
<!-- Top bar -->
<line stroke="#b09ce0" stroke-width="2" stroke-linecap="round" x1="13" y1="4.5" x2="19" y2="4.5"/>
<!-- Buttons -->
<rect fill="#8b5cf6" x="9"  y="2" width="4" height="3.5" rx="1.2"/>
<rect fill="#8b5cf6" x="19" y="2" width="4" height="3.5" rx="1.2"/>

<!-- Outer ring -->
<circle fill="#1e0f40" stroke="#b09ce0" stroke-width="2" cx="16" cy="18" r="12"/>

<!-- Cardinal ticks -->
<g stroke="#b09ce0" stroke-width="1.5" stroke-linecap="round">
  <line x1="16" y1="7.5"  x2="16" y2="10"/>
  <line x1="16" y1="26"   x2="16" y2="28.5"/>
  <line x1="5.5"  y1="18" x2="8"  y2="18"/>
  <line x1="24" y1="18"   x2="26.5" y2="18"/>
</g>

<!-- Hour hand -->
<line stroke="#d4bbff" stroke-width="2" stroke-linecap="round" x1="16" y1="18" x2="11.5" y2="10.5"/>
<!-- Minute hand -->
<line stroke="#00d68f" stroke-width="1.8" stroke-linecap="round" x1="16" y1="18" x2="22" y2="26"/>

<!-- Center dot -->
<circle fill="#00d68f" cx="16" cy="18" r="2"/>
<circle fill="#1e0f40" cx="16" cy="18" r="0.8"/>
</svg>
