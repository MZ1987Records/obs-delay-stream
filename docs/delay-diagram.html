<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遅延タイミング図 — obs-delay-stream</title>
<style>
/* ============================================================
   Base / Dark Theme
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  background: #0a0d12;
  color: #e5e7eb;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  line-height: 1.5;
}

body {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px 20px 40px;
}

/* ============================================================
   Header
   ============================================================ */
header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid #2a2f3a;
  margin-bottom: 16px;
}
header h1 {
  font-size: 18px;
  font-weight: 600;
  color: #f0f2f5;
}
header .subtitle {
  font-size: 12px;
  color: #6b7280;
}

/* ============================================================
   Top Row: Controls + Results
   ============================================================ */
.top-row {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

.panel {
  background: #141922;
  border: 1px solid #2a2f3a;
  border-radius: 6px;
  padding: 12px 14px;
}

.panel-title {
  font-size: 13px;
  font-weight: 600;
  color: #9aa4b2;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ---- Controls ---- */
.control-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px 12px;
  align-items: center;
}

.control-grid label {
  font-size: 12px;
  color: #9aa4b2;
  text-align: right;
  white-space: nowrap;
}

.control-grid input[type="number"],
.control-grid select {
  width: 100%;
  padding: 4px 6px;
  background: #0f1116;
  border: 1px solid #3a4050;
  border-radius: 4px;
  color: #e5e7eb;
  font-size: 13px;
  font-family: inherit;
}
.control-grid input[type="number"]:focus,
.control-grid select:focus {
  outline: none;
  border-color: #4a90d9;
}

.control-grid input[type="number"] {
  -moz-appearance: textfield;
}
.control-grid input::-webkit-outer-spin-button,
.control-grid input::-webkit-inner-spin-button {
  -webkit-appearance: none;
}

.control-separator {
  grid-column: 1 / -1;
  border-top: 1px solid #2a2f3a;
  margin: 4px 0;
}

.ch-label {
  font-weight: 600;
  color: #7eb8f7 !important;
}

/* ---- Results Table ---- */
.results-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
}

.results-table th {
  text-align: center;
  padding: 4px 8px;
  background: #1e2433;
  color: #9aa4b2;
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  border-bottom: 1px solid #2a2f3a;
}

.results-table td {
  text-align: right;
  padding: 4px 8px;
  border-bottom: 1px solid #1e2433;
}

.results-table tbody tr:nth-child(odd) { background: #141922; }
.results-table tbody tr:nth-child(even) { background: #181d28; }

.results-table td:first-child {
  text-align: center;
  color: #7eb8f7;
  font-weight: 600;
}

.results-table .warn { color: #ef4444; font-weight: 700; }

.master-row {
  margin-top: 8px;
  font-size: 13px;
  color: #c4b5fd;
}
.master-row span {
  font-weight: 700;
  font-size: 15px;
}

/* ============================================================
   Diagram
   ============================================================ */
.diagram-panel {
  background: #141922;
  border: 1px solid #2a2f3a;
  border-radius: 6px;
  padding: 16px;
  overflow-x: auto;
}

.diagram-panel .panel-title { margin-bottom: 12px; }

svg text {
  font-family: 'Segoe UI', system-ui, sans-serif;
}

.segment-label {
  font-size: 10px;
  fill: #fff;
  pointer-events: none;
}

.lane-label {
  font-size: 12px;
  fill: #9aa4b2;
  font-weight: 600;
}




/* Legend */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid #2a2f3a;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #9aa4b2;
}

.legend-swatch {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}


/* ============================================================
   Formula Reference
   ============================================================ */
.formula-section {
  margin-top: 16px;
  padding: 12px 14px;
  background: #141922;
  border: 1px solid #2a2f3a;
  border-radius: 6px;
  font-size: 12px;
  color: #6b7280;
}
.formula-section code {
  color: #c4b5fd;
  font-family: 'Cascadia Code', 'Consolas', monospace;
  font-size: 12px;
}

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width: 768px) {
  .top-row { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<header>
  <h1>遅延タイミング図</h1>
  <span class="subtitle">obs-delay-stream</span>
</header>

<!-- ============================================================
     Top Row: Controls + Results
     ============================================================ -->
<div class="top-row">

  <!-- Controls -->
  <div class="panel" id="controls">
    <div class="panel-title">パラメータ</div>
    <div class="control-grid">
      <label for="preset">プリセット</label>
      <select id="preset">
        <option value="domestic">国内2人</option>
        <option value="mixed" selected>海外混在</option>
        <option value="custom">カスタム</option>
      </select>

      <label for="inputR">OBS配信レイテンシ R</label>
      <input type="number" id="inputR" value="1000" min="0" max="10000" step="100">

      <label for="inputA">アバターレイテンシ A</label>
      <input type="number" id="inputA" value="800" min="0" max="5000" step="50">

      <label for="inputBuf">再生バッファ</label>
      <input type="number" id="inputBuf" value="120" min="20" max="500" step="10">

      <label for="inputChCount">チャンネル数</label>
      <select id="inputChCount">
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>

      <div class="control-separator"></div>

      <!-- Ch.1 -->
      <label class="ch-label ch-row" data-ch="0">Ch.1 ブラウザ配信</label>
      <input class="ch-row" data-ch="0" type="number" data-field="C" value="30" min="0" max="5000" step="10">
      <label class="ch-row" data-ch="0">Ch.1 補正</label>
      <input class="ch-row" data-ch="0" type="number" data-field="offset" value="0" min="-3000" max="3000" step="10">

      <!-- Ch.2 -->
      <label class="ch-label ch-row" data-ch="1">Ch.2 ブラウザ配信</label>
      <input class="ch-row" data-ch="1" type="number" data-field="C" value="180" min="0" max="5000" step="10">
      <label class="ch-row" data-ch="1">Ch.2 補正</label>
      <input class="ch-row" data-ch="1" type="number" data-field="offset" value="0" min="-3000" max="3000" step="10">

      <!-- Ch.3 -->
      <label class="ch-label ch-row" data-ch="2" hidden>Ch.3 ブラウザ配信</label>
      <input class="ch-row" data-ch="2" type="number" data-field="C" value="60" min="0" max="5000" step="10" hidden>
      <label class="ch-row" data-ch="2" hidden>Ch.3 補正</label>
      <input class="ch-row" data-ch="2" type="number" data-field="offset" value="0" min="-3000" max="3000" step="10" hidden>

      <!-- Ch.4 -->
      <label class="ch-label ch-row" data-ch="3" hidden>Ch.4 ブラウザ配信</label>
      <input class="ch-row" data-ch="3" type="number" data-field="C" value="90" min="0" max="5000" step="10" hidden>
      <label class="ch-row" data-ch="3" hidden>Ch.4 補正</label>
      <input class="ch-row" data-ch="3" type="number" data-field="offset" value="0" min="-3000" max="3000" step="10" hidden>
    </div>
  </div>

  <!-- Results -->
  <div class="panel" id="results">
    <div class="panel-title">計算結果</div>
    <table class="results-table">
      <thead>
        <tr>
          <th>Ch</th>
          <th>C[i]</th>
          <th>補正</th>
          <th>raw</th>
          <th>floor</th>
          <th>合計 ms</th>
        </tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>
    <div class="master-row" id="masterRow"></div>
  </div>
</div>

<!-- ============================================================
     Diagram
     ============================================================ -->
<div class="diagram-panel">
  <div class="panel-title">タイミング図</div>
  <div style="position:relative;">
    <svg id="timingDiagram" width="100%" height="300"></svg>
  </div>
  <div class="legend" id="legend"></div>
</div>

<!-- ============================================================
     Formula Reference
     ============================================================ -->
<div class="formula-section">
  <strong>計算式</strong> &mdash;
  <code>raw[i] = R - A - C[i] - B + offset[i]</code> &ensp;|&ensp;
  <code>neg_max = max(0, max(-raw[i]))</code> &ensp;|&ensp;
  <code>total[i] = max(0, raw[i] + neg_max)</code> &ensp;|&ensp;
  <code>master_delay = neg_max</code>
</div>

<script>
/* ============================================================
   State
   ============================================================ */
const state = {
  R: 1000,
  A: 800,
  buf: 120,
  chCount: 2,
  channels: [
    { C: 30,  offset: 0 },
    { C: 180, offset: 0 },
    { C: 60,  offset: 0 },
    { C: 90,  offset: 0 },
  ],
};

const PRESETS = {
  domestic: { R: 1000, A: 800, buf: 120, chCount: 2, channels: [{ C: 30, offset: 0 }, { C: 50, offset: 0 }] },
  mixed:    { R: 1000, A: 800, buf: 120, chCount: 2, channels: [{ C: 30, offset: 0 }, { C: 180, offset: 0 }] },
};

/* buf セグメントは描画しない（元の図に合わせる） */

/* ============================================================
   Calculation — faithful port of delay-state.hpp L51-91
   ============================================================ */
function calcAllDelays({ R, A, buf, chCount, channels }) {
  let neg_max = 0;
  const chs = [];
  for (let i = 0; i < chCount; i++) {
    const raw = R - A - channels[i].C - buf + channels[i].offset;
    chs.push({ raw, total: 0, warn: false });
    if (raw < 0 && -raw > neg_max) neg_max = -raw;
  }
  for (const ch of chs) {
    const val = ch.raw + neg_max;
    ch.total = val > 0 ? val : 0;
    ch.warn = (neg_max > 0 && ch.raw === -neg_max);
  }
  return { channels: chs, neg_max, master_delay: neg_max };
}

/* ============================================================
   Segment definitions
   ============================================================ */
const COLORS = {
  delay:     '#8b5cf6',
  ws:        '#2563eb',
  buf:       '#4b5563',
  avatar:    '#f59e0b',
  broadcast: '#14b8a6',
};

const LEGEND = [
  { color: COLORS.delay,     label: 'ディレイ' },
  { color: COLORS.ws,        label: 'ブラウザ配信レイテンシ' },
  { color: COLORS.buf,       label: '再生バッファ' },
  { color: COLORS.avatar,    label: 'アバターレイテンシ' },
  { color: COLORS.broadcast, label: 'OBS配信レイテンシ' },
];

function buildChannelSegments(chIndex, totalMs, C, A, buf) {
  return [
    { label: '', ms: totalMs, color: COLORS.delay,     id: 'obs-delay' },
    { label: '', ms: C,       color: COLORS.ws,        id: 'ws' },
    { label: '', ms: buf,     color: COLORS.buf,       id: 'pbuf' },
    { label: '', ms: A,       color: COLORS.avatar,    id: 'avatar' },
  ];
}

function buildBroadcastSegments(masterDelay, R) {
  return [
    { label: '', ms: masterDelay, color: COLORS.delay,     id: 'master' },
    { label: '', ms: R,           color: COLORS.broadcast, id: 'broadcast' },
  ];
}

function laneTotal(segments) {
  return segments.reduce((s, seg) => s + Math.max(0, seg.ms), 0);
}

/* ============================================================
   SVG Rendering
   ============================================================ */
const SVG_NS = 'http://www.w3.org/2000/svg';
const LANE_H = 32;
const LANE_GAP = 16;
const LABEL_W = 50;
const MARGIN_L = 60;
const MARGIN_R = 20;
const RULER_TOP = 10;
const RULER_H = 20;
const RULER_MARGIN_BOTTOM = 12;
const MARGIN_T = RULER_TOP + RULER_H + RULER_MARGIN_BOTTOM;
const MIN_SEG_W = 3;

function render() {
  const result = calcAllDelays(state);

  // Build all lane data
  const lanes = [];
  for (let i = 0; i < state.chCount; i++) {
    const segs = buildChannelSegments(i, result.channels[i].total, state.channels[i].C, state.A, state.buf);
    lanes.push({ label: `Ch.${i + 1}`, segments: segs, type: 'channel', chIndex: i });
  }
  const broadSegs = buildBroadcastSegments(result.master_delay, state.R);
  lanes.push({ label: '配信', segments: broadSegs, type: 'broadcast' });

  // Compute scale
  const svgEl = document.getElementById('timingDiagram');
  const containerW = svgEl.parentElement.clientWidth || 1100;
  const usableW = containerW - MARGIN_L - MARGIN_R;

  let maxMs = 0;
  for (const lane of lanes) {
    const t = laneTotal(lane.segments);
    if (t > maxMs) maxMs = t;
  }
  const scale = maxMs > 0 ? usableW / maxMs : 1;

  const totalH = MARGIN_T + lanes.length * (LANE_H + LANE_GAP) + 10;
  svgEl.setAttribute('height', totalH);
  svgEl.setAttribute('viewBox', `0 0 ${containerW} ${totalH}`);
  svgEl.innerHTML = '';


  // Ruler
  renderRuler(svgEl, maxMs, scale);

  // Draw lanes
  lanes.forEach((lane, li) => {
    const y = MARGIN_T + li * (LANE_H + LANE_GAP);
    const totalMs = laneTotal(lane.segments);
    const laneOffset = (maxMs - totalMs) * scale; // right-align: pad left

    // Lane label
    const labelEl = ce('text', {
      x: MARGIN_L - 8,
      y: y + LANE_H / 2 + 4,
      'text-anchor': 'end',
      class: 'lane-label',
    });
    labelEl.textContent = lane.label;
    svgEl.appendChild(labelEl);

    // Segments
    let x = MARGIN_L + laneOffset;
    lane.segments.forEach(seg => {
      const w = Math.max(MIN_SEG_W, seg.ms * scale);
      if (seg.ms <= 0 && seg.id !== 'vrc') {
        // Skip zero-width segments (except VRC marker)
        if (seg.id !== 'vrc') return;
      }

      const rect = ce('rect', {
        x, y,
        width: w,
        height: LANE_H,
        fill: seg.hatch ? 'url(#hatch)' : seg.color,
        stroke: seg.hatch ? '#374151' : 'rgba(255,255,255,0.08)',
        'stroke-width': 0.5,
      });
      svgEl.appendChild(rect);

      // Number inside segment if wide enough
      if (w > 24) {
        const msTxt = ce('text', {
          x: x + w / 2,
          y: y + LANE_H / 2,
          'text-anchor': 'middle',
          'dominant-baseline': 'central',
          class: 'segment-label',
        });
        msTxt.textContent = `${Math.round(seg.ms)}`;
        svgEl.appendChild(msTxt);
      }

      x += w;
    });
  });

  // Update results table
  renderResults(result);

  // Legend (once)
  const legendEl = document.getElementById('legend');
  if (legendEl && !legendEl.hasChildNodes()) {
    for (const item of LEGEND) {
      const div = document.createElement('div');
      div.className = 'legend-item';
      div.innerHTML = `<span class="legend-swatch" style="background:${item.color}"></span>${item.label}`;
      legendEl.appendChild(div);
    }
  }
}

function renderRuler(svgEl, maxMs, scale) {
  if (maxMs <= 0) return;
  const baseY = RULER_TOP + RULER_H;
  const tickH = 6;

  // 目盛り間隔を自動決定
  const rawStep = maxMs / 8;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const nice = [1, 2, 5, 10].find(n => n * mag >= rawStep) * mag;

  // ベースライン（ルーラー下端）
  svgEl.appendChild(ce('line', {
    x1: MARGIN_L, y1: baseY,
    x2: MARGIN_L + maxMs * scale, y2: baseY,
    stroke: '#4a5568', 'stroke-width': 1,
  }));

  for (let ms = 0; ms <= maxMs; ms += nice) {
    const x = MARGIN_L + ms * scale;
    // 目盛り線
    svgEl.appendChild(ce('line', {
      x1: x, y1: baseY - tickH,
      x2: x, y2: baseY,
      stroke: '#4a5568', 'stroke-width': 1,
    }));
    // ラベル
    const label = ce('text', {
      x, y: baseY - tickH - 3,
      'text-anchor': 'middle',
      'font-size': '9px',
      fill: '#6b7280',
    });
    label.textContent = ms === 0 ? '0 ms' : `${ms}`;
    svgEl.appendChild(label);
  }
}

function ce(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  }
  return el;
}

/* ============================================================
   Results Table
   ============================================================ */
function renderResults(result) {
  const tbody = document.getElementById('resultsBody');
  tbody.innerHTML = '';
  for (let i = 0; i < state.chCount; i++) {
    const ch = result.channels[i];
    const tr = document.createElement('tr');
    const warnCls = ch.warn ? ' class="warn"' : '';
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${state.channels[i].C}</td>
      <td>${state.channels[i].offset}</td>
      <td${warnCls}>${ch.raw}</td>
      <td>${result.neg_max > 0 ? '+' + result.neg_max : '0'}</td>
      <td><strong>${ch.total}</strong></td>
    `;
    tbody.appendChild(tr);
  }
  document.getElementById('masterRow').innerHTML =
    `OBS 出力遅延 (master): <span>${result.master_delay} ms</span>`;
}

/* ============================================================
   Event Handling
   ============================================================ */
function syncStateFromInputs() {
  state.R = clamp(parseInt(document.getElementById('inputR').value) || 0, 0, 10000);
  state.A = clamp(parseInt(document.getElementById('inputA').value) || 0, 0, 5000);
  state.buf = clamp(parseInt(document.getElementById('inputBuf').value) || 120, 20, 500);
  state.chCount = parseInt(document.getElementById('inputChCount').value) || 2;

  document.querySelectorAll('input.ch-row[data-field="C"]').forEach(el => {
    const ch = parseInt(el.dataset.ch);
    if (ch < 4) state.channels[ch].C = clamp(parseInt(el.value) || 0, 0, 5000);
  });
  document.querySelectorAll('input.ch-row[data-field="offset"]').forEach(el => {
    const ch = parseInt(el.dataset.ch);
    if (ch < 4) state.channels[ch].offset = clamp(parseInt(el.value) || 0, -3000, 3000);
  });
}

function syncInputsFromState() {
  document.getElementById('inputR').value = state.R;
  document.getElementById('inputA').value = state.A;
  document.getElementById('inputBuf').value = state.buf;
  document.getElementById('inputChCount').value = state.chCount;

  document.querySelectorAll('input.ch-row[data-field="C"]').forEach(el => {
    const ch = parseInt(el.dataset.ch);
    if (ch < 4) el.value = state.channels[ch].C;
  });
  document.querySelectorAll('input.ch-row[data-field="offset"]').forEach(el => {
    const ch = parseInt(el.dataset.ch);
    if (ch < 4) el.value = state.channels[ch].offset;
  });
}

function updateChannelVisibility() {
  document.querySelectorAll('.ch-row').forEach(el => {
    const ch = parseInt(el.dataset.ch);
    el.hidden = ch >= state.chCount;
  });
}

function applyPreset(name) {
  const p = PRESETS[name];
  if (!p) return;
  state.R = p.R;
  state.A = p.A;
  state.buf = p.buf;
  state.chCount = p.chCount;
  for (let i = 0; i < p.channels.length && i < 4; i++) {
    state.channels[i].C = p.channels[i].C;
    state.channels[i].offset = p.channels[i].offset;
  }
  syncInputsFromState();
  updateChannelVisibility();
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// Wire up events
document.getElementById('controls').addEventListener('input', e => {
  if (e.target.id === 'preset') return;
  syncStateFromInputs();
  document.getElementById('preset').value = 'custom';
  requestAnimationFrame(render);
});

document.getElementById('inputChCount').addEventListener('change', () => {
  syncStateFromInputs();
  updateChannelVisibility();
  requestAnimationFrame(render);
});

document.getElementById('preset').addEventListener('change', e => {
  applyPreset(e.target.value);
  requestAnimationFrame(render);
});

// Resize
window.addEventListener('resize', () => requestAnimationFrame(render));

// Initial render
updateChannelVisibility();
render();
</script>

</body>
</html>
